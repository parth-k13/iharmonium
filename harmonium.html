<!DOCTYPE html>
<html>

<head>
    <title>i-harmonium</title>
    <style>
        body {
            background: #2c1a12;
            color: #f4e4bc;
            font-family: serif;
            text-align: center;
            padding: 20px;
            cursor: pointer;
        }

        .piano {
            display: flex;
            justify-content: center;
            margin: 40px;
        }

        .key {
            border: 2px solid #f4e4bc;
            width: 60px;
            height: 200px;
            margin: 2px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 10px;
            font-weight: bold;
            position: relative;
            border-radius: 0 0 5px 5px;
        }

        .black {
            background: #1a100b;
            color: white;
            height: 120px;
            width: 40px;
            margin-left: -20px;
            margin-right: -20px;
            z-index: 2;
            border-color: #555;
        }

        .active {
            background: #d4a373 !important;
            color: #2c1a12;
            box-shadow: inset 0 5px 10px rgba(0, 0, 0, 0.5);
        }

        #bellows-meter {
            width: 400px;
            height: 12px;
            border: 1px solid #f4e4bc;
            margin: 20px auto;
            border-radius: 10px;
            overflow: hidden;
        }

        #fill {
            width: 0%;
            height: 100%;
            background: #d4a373;
            transition: width 0.05s linear;
        }

        #status-tip {
            font-style: italic;
            font-size: 0.9em;
            color: #8a7a6a;
        }
    </style>
</head>

<body>
    <h1>i-harmonium</h1>
    <p id="status-tip">Click anywhere once to activate sound, then hold keys and <b>push lid down</b></p>

    <div id="bellows-meter">
        <div id="fill"></div>
    </div>
    <h3 id="angle-display">Lid Angle: 0°</h3>

    <div class="piano">
        <div id="key-a" class="key">C</div>
        <div id="key-w" class="key black">C#</div>
        <div id="key-s" class="key">D</div>
        <div id="key-e" class="key black">D#</div>
        <div id="key-d" class="key">E</div>
        <div id="key-f" class="key">F</div>
        <div id="key-t" class="key black">F#</div>
        <div id="key-g" class="key">G</div>
        <div id="key-y" class="key black">G#</div>
        <div id="key-h" class="key">A</div>
        <div id="key-u" class="key black">A#</div>
        <div id="key-j" class="key">B</div>
        <div id="key-k" class="key">C</div>
    </div>

    <script>

        const samples = {
            'a': 'sounds/c3.wav',
            'w': 'sounds/cs3.wav',
            's': 'sounds/d3.wav',
            'e': 'sounds/ds3.wav',
            'd': 'sounds/e3.wav',
            'f': 'sounds/f3.wav',
            't': 'sounds/fs3.wav',
            'g': 'sounds/g3.wav',
            'y': 'sounds/gs3.wav',
            'h': 'sounds/a3.wav',
            'u': 'sounds/as3.wav',
            'j': 'sounds/b3.wav',
            'k': 'sounds/c4.wav'
        };

        let airPressure = 0;
        let audioCtx, masterGain, bellows = 0, lastAngle = 0;
        let delayNode, feedbackNode;
        let activeOscs = {};

        // Automatic initialization on first interaction
        const initAudio = () => {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0;
            delayNode = audioCtx.createDelay();
            delayNode.delayTime.value = 0.3;

            feedbackNode = audioCtx.createGain();
            feedbackNode.gain.value = 0.45;

            masterGain.connect(audioCtx.destination);
            masterGain.connect(delayNode);

            delayNode.connect(audioCtx.destination);

            delayNode.connect(feedbackNode);
            feedbackNode.connect(delayNode);
            document.getElementById('status-tip').innerText = "Audio Active - Ready to play";
        };

        window.addEventListener('mousedown', initAudio);
        window.addEventListener('keydown', initAudio);

        // Connect to Python Bridge
        const socket = new WebSocket('ws://localhost:8765');
        socket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            let rawAngle = data.angle;
            angle = lastAngle + (rawAngle - lastAngle) * 0.15;
            document.getElementById('angle-display').innerText = `Lid Angle: ${angle.toFixed(1)}°`;

            if (lastAngle !== 0) {
                let change = lastAngle - angle;
                if (change > 0.05) {
                    airPressure += change * 3;
                    airPressure = Math.min(1.5, Math.max(0, airPressure));
                } else {
                    bellows *= 0.98;
                }
            }
            lastAngle = angle;
        };

        // Natural air decay
        setInterval(() => {
            airPressure *= 0.97;
            bellows = airPressure;

            document.getElementById('fill').style.width = (bellows * 100) + "%";

            Object.values(activeOscs).forEach(audio => {
                audio.volume = bellows;
            });

        }, 50);

        window.onkeydown = (e) => {
            const key = e.key.toLowerCase();

            if (samples[key] && !activeOscs[key]) {

                const audio = new Audio(samples[key]);
                audio.loop = true;
                audio.volume = Math.min(1, bellows);
                audio.play();

                // air used by the reed when a key is pressed
                airPressure -= 0.05;
                airPressure = Math.max(0, airPressure);

                activeOscs[key] = audio;

                const el = document.getElementById(`key-${key}`);
                if (el) el.classList.add('active');
            }
        };

        window.onkeyup = (e) => {
            const key = e.key.toLowerCase();

            if (activeOscs[key]) {
                activeOscs[key].pause();
                activeOscs[key].currentTime = 0;

                delete activeOscs[key];

                const el = document.getElementById(`key-${key}`);
                if (el) el.classList.remove('active');
            }
        };
    </script>
</body>

</html>
